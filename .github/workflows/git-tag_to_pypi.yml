# version: 4.2
# (This version will be checked by ReleaseMe.)
name: Publish to PyPI

on:
#  push:  # We no longer trigger on pushed tags because then old versions of the workflow could trigger if they exist on older commits that are then tagged retroactively.
#    tags:
#      - 'v[0-9]*'
#      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Name of the tag to release. Must exist and must match pyproject.toml version."
        required: true
      project:
        description: "Name of the PyPI project to release to. Will override the project name in the TOML, if given."
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Hatch
        run: pip install hatch

      - name: "TOML: Check if version matches tag"
        run: |
          TAG_VERSION=${{ github.event.inputs.tag || github.ref_name }}
          PROJECT_VERSION=$(hatch version)
      
          echo "     Git tag: $TAG_VERSION"
          echo "TOML version: $PROJECT_VERSION"

          # To compare numerical versions, they are normalised so that they have no 'v' prefix and have no leading zeroes: "v001.2001.00" becomes "1.2001.0" and so on.
          normalise() {
            echo "$1" |
              sed -E 's/^v//' |
              awk -F. '{for(i=1;i<=NF;i++) $i+=0}1' OFS=.
          }
      
          if [[ "$TAG_VERSION" =~ ^v?[0-9.]+$ && "$PROJECT_VERSION" =~ ^v?[0-9.]+$ ]]; then
            TAG_NORM=$(normalise "$TAG_VERSION")
            PROJ_NORM=$(normalise "$PROJECT_VERSION")
      
            echo "         Normalised tag: $TAG_NORM"
            echo "Normalised TOML version: $PROJ_NORM"
      
            if [[ "$TAG_NORM" != "$PROJ_NORM" ]]; then
              echo "❌ Version mismatch between tag ($TAG_VERSION) and pyproject.toml ($PROJECT_VERSION)."
              exit 1
            fi
          else
            echo "Skipping version comparison (non-numeric)."
          fi
      
          sed -i "s/^version\\s*=\\s*.*/version = \"$TAG_VERSION\"/" pyproject.toml

      - name: "TOML: Replace PyPI project name"
        if: "${{ github.event.inputs.project != '' }}"
        run: |
          PROJECT=${{ github.event.inputs.project }}
          sed -i "s/^name\\s*=\\s*.*/name = \"$PROJECT\"/" pyproject.toml

      - name: "TOML: Erase git+https dependencies"  # If you don't do this, you will get an HTTP 400 status code from PyPI.
        run: sed -i "/git+https/d" pyproject.toml   # You don't need to escape a + for sed to see it as a literal.

      - name: "TOML: Fix setuptools"  # If you don't do this, setuptools won't use [project].name.
        run: sed -i 's/"setuptools"/"setuptools>=61"/' pyproject.toml

      - name: "TOML: Fix hatchling"
        run: |
          # 1. Check for hatchling backend
          if ! grep -q 'build-backend *= *"hatchling.build"' pyproject.toml; then
            echo "No hatchling backend found, nothing to do."
            exit 0
          fi

          # 2. Check if wheel target already defined
          if grep -q '^\[tool\.hatch\.build\.targets\.wheel\]' pyproject.toml; then
            echo "Wheel target already defined, nothing to do."
            exit 0
          fi

          # 3. Check src directory exists
          if [ ! -d "src" ]; then
            echo "Error: 'src' directory not found."
            exit 1
          fi

          # 4. Collect all subdirectories in src that have an init file
          subdirs=$(find src -mindepth 1 -maxdepth 1 -type d -exec test -f "{}/__init__.py" \; -print | sort)
          if [ -z "$subdirs" ]; then
            echo "Error: no subdirectories found inside src/."
            exit 1
          fi

          echo "Detected package folders:"
          printf " - %s\n" $subdirs

          # 5. Build TOML array
          packages=""
          for dir in $subdirs; do
            name=$(basename "$dir")
            packages="$packages\"./src/$name\", "
          done
          packages=$(printf "%s" "$packages" | sed 's/, $//')  # Remove trailing comma and space

          # 6. Append configuration
          cat >> pyproject.toml <<EOF

          [tool.hatch.build.targets.wheel]
          packages = [$packages]
          EOF

      - name: "README: Fix relative image links"
        run: |
          REPO=${{ github.repository }}
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          export REPO TAG
          [ -f README.md ] && perl -pi -e 's#(<img[^>]*src=")(?!https?://)(\.?/)?([^"]*)"#$1https://raw.githubusercontent.com/$ENV{REPO}/$ENV{TAG}/$3"#g' README.md

      - name: Publish to PyPI
        env:
          HATCH_INDEX_USER: __token__
          HATCH_INDEX_AUTH: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cat pyproject.toml
          hatch build
          hatch publish
