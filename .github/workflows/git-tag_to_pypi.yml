# version: 3.2
name: Publish to PyPI

on:
  push:
    tags:  # Glob patterns for tags that will trigger the workflow when pushed.
      - 'v[0-9]*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release. Must exist and must match pyproject.toml version."
        required: true


jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Note: when you push a tag, GitHub runs git checkout on that tag and runs the workflow if present there. Then 'on push' finds the tag and then this checkout happens (I guess somewhat redundantly). We have the workflow dispatch to circumvent this, but since that workflow dispatch is called on the current version of the workflow, we have to now specify to the checkout which commit you want.
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Hatch
        run: pip install hatch

      - name: Erase dependencies on source code    # If you don't do this, you will get an HTTP 400 status code :(
        run: sed -i "/git+https/d" pyproject.toml  # You don't need to escape a + for sed to see it as a literal.

      - name: Check if TOML version matches tag
        run: |
          TAG_VERSION=${{ github.event.inputs.tag || github.ref_name }}
          PROJECT_VERSION=$(hatch version)
      
          echo "     Git tag: $TAG_VERSION"
          echo "TOML version: $PROJECT_VERSION"

          # To compare numerical versions, they are normalised so that they have no 'v' prefix and have no leading zeroes: "v001.2001.00" becomes "1.2001.0" and so on.
          normalise() {
            echo "$1" |
              sed -E 's/^v//' |
              awk -F. '{for(i=1;i<=NF;i++) $i+=0}1' OFS=.
          }
      
          if [[ "$TAG_VERSION" =~ ^v?[0-9.]+$ && "$PROJECT_VERSION" =~ ^v?[0-9.]+$ ]]; then
            TAG_NORM=$(normalise "$TAG_VERSION")
            PROJ_NORM=$(normalise "$PROJECT_VERSION")
      
            echo "         Normalised tag: $TAG_NORM"
            echo "Normalised TOML version: $PROJ_NORM"
      
            if [[ "$TAG_NORM" != "$PROJ_NORM" ]]; then
              echo "❌ Version mismatch between tag ($TAG_VERSION) and pyproject.toml ($PROJECT_VERSION)."
              exit 1
            fi
          else
            echo "Skipping version comparison (non-numeric)."
          fi
      
          sed -i "s/^version\\s*=\\s*.*?\\n/version = \"$TAG_VERSION\"\\n/" pyproject.toml

      - name: Publish to PyPI
        env:
          HATCH_INDEX_USER: __token__
          HATCH_INDEX_AUTH: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          hatch build
          hatch publish
